version: '3.8'

services:
  # 1. App (Spring Boot)
  wagle-app:
    image: ${DOCKERHUB_USERNAME}/wagle-server:latest
    container_name: wagle-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=wagle-redis
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - wagle-redis
    networks:
      - wagle-network

  # 2. MySQL (데이터베이스)
  wagle-db:
    image: mysql:8.0
    container_name: wagle-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: wagle
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db/mysql_data:/var/lib/mysql
    networks:
      - wagle-network

  # 3. Redis (캐시 & 위치 저장)
  wagle-redis:
    image: redis:alpine
    container_name: wagle-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./db/redis_data:/data
    networks:
      - wagle-network

networks:
  wagle-network:
    driver: bridge
